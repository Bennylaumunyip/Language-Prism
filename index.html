<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Prism - Word Detective Game</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.321.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800;900&display=swap');
        
        body { 
            font-family: 'Lexend', sans-serif; 
            background: linear-gradient(135deg, #fef3c7 0%, #dcfce7 50%, #dbeafe 100%);
            min-height: 100vh;
        }

        .card-pop {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-pop:hover {
            transform: scale(1.01) translateY(-5px);
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }

        .progress-glow {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .rainbow-text {
            background: linear-gradient(to right, #ef4444, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .detective-word {
            text-decoration: underline;
            text-decoration-color: #3b82f6;
            text-decoration-thickness: 4px;
            text-underline-offset: 6px;
            color: #1e293b;
        }
    </style>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- COMPLETE QUESTION BANK FROM DOCUMENT ---
        const QUESTION_BANKS = {
            lower: [
                { stems: [{ text: "My younger brother started <u>primary school</u> this year.", ans: "British English" }, { text: "My younger brother started <u>elementary school</u> this year.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "I used a <u>rubber</u> to erase my mistake in the workbook.", ans: "British English" }, { text: "I used an <u>eraser</u> to erase my mistake in the workbook.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "The <u>kids</u> are having fun at the park.", ans: "American English" }, { text: "The <u>children</u> are having fun at the park.", ans: "British English" }], options: ["British English", "American English"] },
                { stems: [{ text: "The teacher gave each student a <u>cookie</u> during recess.", ans: "American English" }, { text: "The teacher gave each student a <u>biscuit</u> during recess.", ans: "British English" }], options: ["British English", "American English"] },
                { stems: [{ text: "“He <u>very clever</u>,” said Mrs Lim.", ans: "Singlish" }, { text: "“He <u>is very clever</u>,“ said Mrs Lim.", ans: "British English" }], options: ["British English", "Singlish"] },
                { stems: [{ text: "I offered my little brother a <u>candy</u> after dinner.", ans: "American English" }, { text: "I offered my little brother a <u>sweet</u> after dinner.", ans: "British English" }], options: ["British English", "American English"] },
                { stems: [{ text: "The <u>airplane</u> took off smoothly from Changi Airport.", ans: "American English" }, { text: "The <u>aeroplane</u> took off smoothly from Changi Airport.", ans: "British English" }], options: ["British English", "American English"] },
                { stems: [{ text: "He plays <u>football</u> with his friends every weekend.", ans: "British English" }, { text: "He plays <u>soccer</u> with his friends every weekend.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "We took a <u>cab</u> to the airport this morning.", ans: "American English" }, { text: "We took a <u>taxi</u> to the airport this morning.", ans: "British English" }], options: ["British English", "American English"] },
                { stems: [{ text: "He emptied the <u>rubbish bin</u> after dinner.", ans: "British English" }, { text: "He emptied the <u>trash bin</u> after dinner.", ans: "American English" }], options: ["British English", "American English"] }
            ],
            middle: [
                { stems: [{ text: "He shone a <u>torchlight</u> under the bed.", ans: "Singlish" }, { text: "He shone a <u>torch</u> under the bed.", ans: "British English" }, { text: "He shone a <u>flashlight</u> under the bed.", ans: "American English" }], options: ["Singlish", "British English", "American English"] },
                { stems: [{ text: "The <u>tap</u> in the kitchen is leaking.", ans: "British English" }, { text: "The <u>faucet</u> in the kitchen is leaking.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "My father stopped at the <u>petrol station</u> to fill up the car.", ans: "British English" }, { text: "My father stopped at the <u>gas station</u> to fill up the car.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "I need to use the <u>toilet</u> before we leave.", ans: "British English" }, { text: "I need to use the <u>restroom</u> before we leave.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "The students <u>queue up</u> for food in the canteen.", ans: "British English" }, { text: "The students <u>line up</u> for food in the canteen.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "He filled the <u>jug</u> with lemonade for the party.", ans: "British English" }, { text: "He filled the <u>pitcher</u> with lemonade for the party.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "I bought a <u>tin</u> of sardines from the supermarket.", ans: "British English" }, { text: "I bought a <u>can</u> of sardines from the supermarket.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "Mrs Chan is the <u>Headmistress</u> of our school.", ans: "British English" }, { text: "Mrs Chan is the <u>Principal</u> of our school.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "He bought a new pair of black <u>trousers</u> for work.", ans: "British English" }, { text: "He bought a new pair of black <u>pants</u> for work.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "The <u>lift</u> is out of order today.", ans: "British English" }, { text: "The <u>elevator</u> is out of order today.", ans: "American English" }], options: ["British English", "American English"] }
            ],
            upper: [
                { stems: [{ text: "People enjoy the park during <u>autumn</u>.", ans: "British English" }, { text: "People enjoy the park during <u>fall</u>.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "Can you <u>chope</u> a seat for me?", ans: "Singlish" }, { text: "Could you <u>save</u> me a seat?", ans: "British English" }], options: ["British English", "Singlish"] },
                { stems: [{ text: "I bought potato <u>crisps</u>.", ans: "British English" }, { text: "I bought potato <u>chips</u>.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "I bought a <u>takeaway</u> for dinner.", ans: "British English" }, { text: "I bought a <u>takeout</u> for dinner.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "I need to check my <u>timetable</u> to see what’s after recess.", ans: "British English" }, { text: "I need to check my <u>schedule</u> to see what’s after recess.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "She put her luggage in the <u>boot</u> of the car.", ans: "British English" }, { text: "She put her luggage in the <u>trunk</u> of the car.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "He is a very <u>clever</u> boy.", ans: "British English" }, { text: "He is a very <u>smart</u> boy.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "The <u>flat</u> is on the fifth floor.", ans: "British English" }, { text: "The <u>apartment</u> is on the fifth floor.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "I need to check the <u>post</u>.", ans: "British English" }, { text: "I need to check the <u>mail</u>.", ans: "American English" }], options: ["British English", "American English"] },
                { stems: [{ text: "Don't forget the <u>pavement</u> is wet.", ans: "British English" }, { text: "Don't forget the <u>sidewalk</u> is wet.", ans: "American English" }], options: ["British English", "American English"] }
            ]
        };

        const FLAGS = { "American English": "🇺🇸", "Singlish": "🇸🇬", "British English": "🇬🇧" };
        const TIER_LABELS = { lower: "P1-P2 (Beginner)", middle: "P3-P4 (Explorer)", upper: "P5-P6 (Expert)" };
        const apiKey = "";

        const App = () => {
            const [screen, setScreen] = useState('home');
            const [level, setLevel] = useState(null);
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [score, setScore] = useState(0);
            const [maxScore, setMaxScore] = useState(0);
            const [loadingAudio, setLoadingAudio] = useState(null);

            const startQuiz = (lvl) => {
                setLevel(lvl);
                const bank = QUESTION_BANKS[lvl];
                // Fisher-Yates Shuffle for true rotation
                const shuffled = [...bank].sort(() => Math.random() - 0.5);
                setQuestions(shuffled.slice(0, 10)); // Pick 10 at random
                setCurrentIndex(0);
                setScore(0);
                setMaxScore(0);
                setAnswers({});
                setIsSubmitted(false);
                setScreen('instructions');
            };

            const handleSubmit = () => {
                let currentQScore = 0;
                const q = questions[currentIndex];
                q.stems.forEach((s, idx) => {
                    if (answers[idx] === s.ans) currentQScore++;
                });
                setScore(s => s + currentQScore);
                setMaxScore(m => m + q.stems.length);
                setIsSubmitted(true);
            };

            const handleNext = () => {
                if (currentIndex < questions.length - 1) {
                    setCurrentIndex(i => i + 1);
                    setAnswers({});
                    setIsSubmitted(false);
                } else {
                    setScreen('result');
                }
            };

            const playAudio = async (text, idx) => {
                const cleanText = text.replace(/<[^>]*>/g, '');
                setLoadingAudio(idx);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Say naturally: ${cleanText}` }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                            }
                        })
                    });
                    const result = await response.json();
                    const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                    const blob = new Blob([createWavHeader(atob(pcmData), 24000)], { type: 'audio/wav' });
                    const audio = new Audio(URL.createObjectURL(blob));
                    audio.onended = () => setLoadingAudio(null);
                    audio.play();
                } catch (e) {
                    setLoadingAudio(null);
                }
            };

            const createWavHeader = (data, sampleRate) => {
                const buffer = new ArrayBuffer(44 + data.length);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF'); view.setUint32(4, 32 + data.length, true);
                writeString(8, 'WAVE'); writeString(12, 'fmt ');
                view.setUint32(16, 16, true); view.setUint16(20, 1, true);
                view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true);
                view.setUint16(34, 16, true); writeString(36, 'data');
                view.setUint32(40, data.length, true);
                for (let i = 0; i < data.length; i++) view.setUint8(44 + i, data.charCodeAt(i));
                return buffer;
            };

            const Home = () => (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 text-center">
                    <div className="bg-white/90 backdrop-blur-md p-10 md:p-16 rounded-[4rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] max-w-4xl w-full border-8 border-white animate-float">
                        <div className="mb-8 flex justify-center gap-8 text-7xl drop-shadow-lg">
                            <span>{FLAGS["Singlish"]}</span><span>{FLAGS["British English"]}</span><span>{FLAGS["American English"]}</span>
                        </div>
                        <h1 className="text-6xl md:text-7xl font-[900] mb-6 tracking-tight text-slate-800 drop-shadow-sm">
                            Welcome to <span className="rainbow-text">Language Prism</span>
                        </h1>
                        <p className="text-2xl text-slate-600 mb-12 font-semibold max-w-2xl mx-auto leading-relaxed">
                            "We are going on a trip to three different places: the USA, the UK, and Singapore. Even though people in these places all speak English, they sometimes use different words for the same thing. In this game, your job is to be a word detective!"
                        </p>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <LevelBtn title="P1-P2" sub="Beginner" color="bg-[#FF9FF3]" shadow="shadow-[#f368e0]" icon="🎈" onClick={() => startQuiz('lower')} />
                            <LevelBtn title="P3-P4" sub="Explorer" color="bg-[#FECA57]" shadow="shadow-[#ff9f43]" icon="🚀" onClick={() => startQuiz('middle')} />
                            <LevelBtn title="P5-P6" sub="Expert" color="bg-[#48DBFB]" shadow="shadow-[#0abde3]" icon="🧠" onClick={() => startQuiz('upper')} />
                        </div>
                    </div>
                </div>
            );

            const LevelBtn = ({ title, sub, color, shadow, icon, onClick }) => (
                <button onClick={onClick} className={`${color} ${shadow} p-8 rounded-[3rem] text-white shadow-[0_12px_0_0] hover:shadow-none hover:translate-y-[8px] transition-all active:scale-95 flex flex-col items-center border-4 border-white`}>
                    <span className="text-6xl mb-4">{icon}</span>
                    <span className="font-black text-3xl mb-1">{title}</span>
                    <span className="text-lg font-bold opacity-90 tracking-widest uppercase">{sub}</span>
                </button>
            );

            const Instructions = () => (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <div className="bg-white p-12 rounded-[4rem] shadow-2xl max-w-3xl w-full border-8 border-blue-100 text-center relative">
                        {/* Selected Tier Badge */}
                        <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-8 py-2 rounded-full font-black text-xl shadow-lg border-4 border-white">
                            TIER: {TIER_LABELS[level]}
                        </div>

                        <h2 className="text-5xl font-black text-slate-800 mb-8 mt-4">How to Play:</h2>
                        <div className="space-y-6 mb-12 text-left">
                            <Step icon="📖" text="Read the sentences carefully." color="bg-pink-100 text-pink-600" />
                            <Step icon="🔍" text={<span>Look at the <span className="underline decoration-blue-500 decoration-4">underlined words</span>.</span>} color="bg-yellow-100 text-yellow-600" />
                            <Step icon="🌍" text="Guess which country uses that word! Is it American English, British English, or Singlish?" color="bg-green-100 text-green-600" />
                        </div>
                        <p className="text-xl font-bold text-slate-500 mb-10 italic">Are you ready to spot the differences? Let’s play! 🕵️‍♂️✨</p>
                        
                        <div className="flex flex-col sm:flex-row gap-4">
                            <button onClick={() => setScreen('home')} className="flex-1 bg-slate-100 text-slate-600 py-6 rounded-[2.5rem] font-black text-2xl hover:bg-slate-200 transition-all border-4 border-slate-200">
                                BACK TO MENU
                            </button>
                            <button onClick={() => setScreen('quiz')} className="flex-[2] bg-green-500 text-white py-6 rounded-[2.5rem] font-black text-3xl shadow-[0_10px_0_0_#22c55e] hover:shadow-none hover:translate-y-2 transition-all">
                                START! ✨
                            </button>
                        </div>
                    </div>
                </div>
            );

            const Step = ({ icon, text, color }) => (
                <div className="flex items-center gap-6 p-5 rounded-3xl bg-slate-50 border-2 border-slate-100">
                    <span className={`text-4xl w-16 h-16 flex items-center justify-center rounded-2xl flex-shrink-0 ${color}`}>{icon}</span>
                    <span className="text-2xl font-bold text-slate-700 leading-snug">{text}</span>
                </div>
            );

            const Quiz = () => {
                const q = questions[currentIndex];
                if (!q) return null;
                return (
                    <div className="p-6 md:p-10 max-w-7xl mx-auto">
                        <div className="flex justify-between items-center mb-10">
                            <button onClick={() => setScreen('home')} className="bg-white p-4 rounded-2xl shadow-md text-slate-500 hover:text-pink-500 transition-colors">
                                <i data-lucide="home"></i>
                            </button>
                            <div className="bg-white px-8 py-3 rounded-full shadow-md font-black text-slate-600 flex items-center gap-3">
                                <span className="w-3 h-3 rounded-full bg-green-500 animate-pulse"></span>
                                DETECTIVE MODE: {level.toUpperCase()}
                            </div>
                            <div className="text-3xl font-black text-slate-400">{currentIndex + 1} / {questions.length}</div>
                        </div>

                        <div className="w-full bg-white h-6 rounded-full mb-12 p-1 shadow-inner border-2 border-slate-200">
                            <div className="bg-gradient-to-r from-pink-400 to-blue-400 h-full rounded-full transition-all duration-700 progress-glow" style={{ width: `${((currentIndex + 1) / questions.length) * 100}%` }}></div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                            {q.stems.map((s, idx) => (
                                <div key={idx} className={`p-10 rounded-[4rem] border-8 transition-all card-pop relative overflow-hidden flex flex-col justify-between ${isSubmitted ? (answers[idx] === s.ans ? 'border-green-400 bg-green-50' : 'border-red-400 bg-red-50') : 'bg-white border-white shadow-xl'}`}>
                                    <div>
                                        <div className="flex justify-between items-center mb-8">
                                            <button 
                                                onClick={() => playAudio(s.text, idx)}
                                                className={`w-20 h-20 rounded-[1.5rem] transition-all flex items-center justify-center text-4xl shadow-lg ${loadingAudio === idx ? 'bg-yellow-400 animate-pulse text-white' : 'bg-blue-500 text-white hover:bg-blue-600 active:scale-90'}`}
                                            >
                                                <i data-lucide={loadingAudio === idx ? "loader-2" : "volume-2"}></i>
                                            </button>
                                            <div className="text-slate-300 font-bold italic text-xl">Sentence {idx + 1}</div>
                                        </div>
                                        
                                        <p 
                                            className="text-3xl md:text-4xl font-extrabold text-slate-800 mb-12 leading-[1.4]"
                                            dangerouslySetInnerHTML={{ __html: s.text.replace(/<u>/g, '<span class="detective-word">').replace(/<\/u>/g, '</span>') }}
                                        />
                                    </div>

                                    <div className="space-y-4">
                                        {q.options.map(opt => {
                                            const isSel = answers[idx] === opt;
                                            const isCorrect = s.ans === opt;
                                            let cls = "w-full p-6 rounded-[2rem] font-black text-xl text-left border-4 transition-all flex justify-between items-center ";
                                            
                                            if (isSubmitted) {
                                                if (isCorrect) cls += "bg-green-500 border-green-600 text-white shadow-[0_8px_0_0_#16a34a]";
                                                else if (isSel) cls += "bg-red-500 border-red-600 text-white shadow-[0_8px_0_0_#dc2626]";
                                                else cls += "opacity-30 border-slate-100 bg-slate-50";
                                            } else {
                                                cls += isSel ? "bg-blue-500 border-blue-600 text-white shadow-[0_8px_0_0_#2563eb] translate-y-[-2px]" : "bg-white border-slate-100 hover:border-blue-200 hover:bg-blue-50 text-slate-600 shadow-md";
                                            }

                                            return (
                                                <button key={opt} disabled={isSubmitted} onClick={() => setAnswers({...answers, [idx]: opt})} className={cls}>
                                                    <span className="flex items-center gap-4">
                                                        <span className="text-4xl">
                                                            {FLAGS[opt]}
                                                        </span> 
                                                        {opt}
                                                    </span>
                                                    {isSubmitted && isCorrect && <i data-lucide="sparkles" className="animate-bounce"></i>}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="mt-20 flex justify-center pb-20">
                            {!isSubmitted ? (
                                <button 
                                    onClick={handleSubmit}
                                    disabled={Object.keys(answers).length < q.stems.length}
                                    className="bg-slate-800 text-white px-20 py-8 rounded-[3rem] font-black text-4xl shadow-[0_15px_0_0_#000] hover:shadow-none hover:translate-y-3 active:scale-95 disabled:opacity-20 transition-all"
                                >
                                    CHECK ANSWERS
                                </button>
                            ) : (
                                <button 
                                    onClick={handleNext} 
                                    className="bg-gradient-to-r from-pink-500 to-purple-500 text-white px-20 py-8 rounded-[3rem] font-black text-4xl shadow-[0_15px_0_0_#9333ea] hover:shadow-none hover:translate-y-3 transition-all animate-bounce-short flex items-center gap-6"
                                >
                                    NEXT QUESTION <i data-lucide="chevron-right" className="w-10 h-10"></i>
                                </button>
                            )}
                        </div>
                    </div>
                );
            };

            const Result = () => {
                const pct = Math.round((score / maxScore) * 100);
                const isWinner = pct > 70;
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-6 text-center">
                        <div className="bg-white p-16 rounded-[5rem] shadow-2xl max-w-2xl w-full border-8 border-yellow-200">
                            <div className="text-9xl mb-10 animate-float">{isWinner ? "🎖️" : "🔎"}</div>
                            <h2 className="text-5xl font-black text-slate-800 mb-8">{isWinner ? "Master Detective!" : "Good Effort!"}</h2>
                            <div className="text-[10rem] font-black leading-none rainbow-text mb-12">{pct}%</div>
                            <div className="space-y-6">
                                <button onClick={() => startQuiz(level)} className="w-full bg-blue-500 text-white py-8 rounded-[3rem] font-black text-3xl shadow-[0_12px_0_0_#2563eb] hover:shadow-none hover:translate-y-3 transition-all">
                                    TRY AGAIN
                                </button>
                                <button onClick={() => setScreen('home')} className="w-full bg-white border-4 border-slate-100 text-slate-400 py-8 rounded-[3rem] font-black text-2xl hover:bg-slate-50 transition-all">
                                    BACK TO MENU
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            useEffect(() => { lucide.createIcons(); }, [screen, currentIndex, isSubmitted]);

            return (
                <div className="min-h-screen">
                    {screen === 'home' && <Home />}
                    {screen === 'instructions' && <Instructions />}
                    {screen === 'quiz' && <Quiz />}
                    {screen === 'result' && <Result />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
